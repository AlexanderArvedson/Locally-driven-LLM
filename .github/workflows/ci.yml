name: CI - Tests and Runtime Validation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push: {}
  pull_request: {}

jobs:
  test-and-smoke:
    name: Unit tests and runtime validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install toolkit (uv) and project
        run: |
          python -m pip install uv
          uv sync

      - name: Ensure runtime directories exist
        run: |
          mkdir -p .runtime/logs .runtime/failed_patches .runtime/traces .runtime/runs
          touch .runtime/logs/.gitkeep .runtime/failed_patches/.gitkeep .runtime/traces/.gitkeep .runtime/runs/.gitkeep

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          python3 -m unittest -q

      - name: Check runtime presence (at least one run file)
        run: |
          source .venv/bin/activate
          python3 scripts/check_runtime_presence.py

      - name: Validate runtime JSONL logs
        run: |
          source .venv/bin/activate
          python3 scripts/validate_run_logs.py

      - name: Upload runtime logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: .runtime/runs

      - name: Upload failed patches (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-patches
          path: .runtime/failed_patches
