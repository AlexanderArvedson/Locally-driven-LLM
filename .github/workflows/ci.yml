name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run tests
        env:
          CI: 'true'
          VERIFIER_USE_SUBPROCESS: '1'
        run: |
          pytest -q

  runtime-validation:
    name: Runtime validation and smoke checks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install toolkit (uv) and project
        run: |
          python -m pip install uv
          uv sync || true

      - name: Ensure runtime directories exist
        run: |
          mkdir -p .runtime/logs .runtime/failed_patches .runtime/traces .runtime/runs
          touch .runtime/logs/.gitkeep .runtime/failed_patches/.gitkeep .runtime/traces/.gitkeep .runtime/runs/.gitkeep

      - name: Run unit tests (tooling path)
        run: |
          uv run -m unittest -q || true

      - name: Check runtime presence (at least one run file)
        run: |
          uv run python scripts/check_runtime_presence.py || true

      - name: Validate runtime JSONL logs
        run: |
          uv run python scripts/validate_run_logs.py || true

      - name: Upload runtime logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logs
          path: .runtime/runs

      - name: Upload failed patches (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-patches
          path: .runtime/failed_patches
